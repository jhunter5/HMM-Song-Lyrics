<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Song Lyrics Pipeline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #fff;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 0.4rem;
    }

    .drop-zone {
      border: 2px dashed #333;
      border-radius: 8px;
      padding: 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: #6c63ff;
      background: #1f1e2e;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-zone .hint {
      font-size: 0.85rem;
      color: #555;
    }

    .drop-zone .selected {
      font-size: 0.9rem;
      color: #a0e0b0;
      word-break: break-all;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }

    button:hover:not(:disabled) { background: #574fd6; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }

    #status {
      margin-top: 1rem;
      font-size: 0.85rem;
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      display: none;
    }

    #status.info    { background: #1a2535; color: #7ab3f0; display: block; }
    #status.success { background: #122418; color: #6fcf97; display: block; }
    #status.error   { background: #2a1212; color: #eb5757; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Song Lyrics Pipeline</h1>

    <div class="field">
      <label>Audio file (.mp3)</label>
      <div class="drop-zone" id="audioZone">
        <input type="file" id="audioFile" accept=".mp3,audio/mpeg" />
        <span class="hint" id="audioHint">Click or drag an MP3 here</span>
      </div>
    </div>

    <div class="field">
      <label>Lyrics file (.txt)</label>
      <div class="drop-zone" id="lyricsZone">
        <input type="file" id="lyricsFile" accept=".txt,text/plain" />
        <span class="hint" id="lyricsHint">Click or drag a TXT here</span>
      </div>
    </div>

    <button id="submitBtn" disabled>Upload &amp; Process</button>
    <div id="status"></div>
  </div>

  <script>
    const audioInput  = document.getElementById('audioFile');
    const lyricsInput = document.getElementById('lyricsFile');
    const submitBtn   = document.getElementById('submitBtn');
    const statusEl    = document.getElementById('status');

    function updateHint(input, hintId) {
      const hint = document.getElementById(hintId);
      hint.textContent = input.files[0] ? input.files[0].name : hint.dataset.default;
      hint.className = input.files[0] ? 'selected' : 'hint';
      checkReady();
    }

    function checkReady() {
      submitBtn.disabled = !(audioInput.files[0] && lyricsInput.files[0]);
    }

    function addDragEvents(zoneId, input) {
      const zone = document.getElementById(zoneId);
      zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('dragover'); });
      zone.addEventListener('dragleave', ()  => zone.classList.remove('dragover'));
      zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
          const dt = new DataTransfer();
          dt.items.add(e.dataTransfer.files[0]);
          input.files = dt.files;
          input.dispatchEvent(new Event('change'));
        }
      });
    }

    document.getElementById('audioHint').dataset.default  = 'Click or drag an MP3 here';
    document.getElementById('lyricsHint').dataset.default = 'Click or drag a TXT here';

    audioInput.addEventListener('change',  () => updateHint(audioInput,  'audioHint'));
    lyricsInput.addEventListener('change', () => updateHint(lyricsInput, 'lyricsHint'));

    addDragEvents('audioZone',  audioInput);
    addDragEvents('lyricsZone', lyricsInput);

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className   = type;
    }

    submitBtn.addEventListener('click', async () => {
      const formData = new FormData();
      formData.append('audio',  audioInput.files[0]);
      formData.append('lyrics', lyricsInput.files[0]);

      submitBtn.disabled = true;
      setStatus('Uploading...', 'info');

      try {
        const res = await fetch('/api/upload', { method: 'POST', body: formData });
        if (res.ok) {
          setStatus(`Done — ${res.status} ${res.statusText}`, 'success');
        } else {
          const body = await res.text();
          setStatus(`Server error ${res.status}: ${body}`, 'error');
        }
      } catch (err) {
        setStatus(`Request failed: ${err.message}`, 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
